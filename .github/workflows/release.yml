name: Build and release plugin

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Validate and package
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install validation tools
        run: |
          sudo apt-get update
          sudo apt-get install -y gettext unzip zip

      - name: Validate source
        run: |
          set -euo pipefail

          php -l wc-herroepingsfunctie.php
          node --check assets/js/checkout-blocks.js
          empty_tree="$(git hash-object -t tree /dev/null)"
          git diff --check "$empty_tree" HEAD

          for file in languages/*.po; do
            msgfmt -c -o /tmp/check.mo "$file"
          done
          rm -f /tmp/check.mo

      - name: Read and verify version metadata
        id: version
        shell: bash
        run: |
          set -euo pipefail

          plugin_version="$(awk -F': *' '/^[[:space:]]+\* Version:/ { print $2; exit }' wc-herroepingsfunctie.php)"
          constant_version="$(php -r '$file = file_get_contents("wc-herroepingsfunctie.php"); preg_match("/define\\(\\s*'\''WCH_VERSION'\''\\s*,\\s*'\''([^'\'']+)'\''\\s*\\)/", $file, $matches); echo $matches[1] ?? "";')"
          stable_tag="$(awk -F': *' 'tolower($1) == "stable tag" { print $2; exit }' readme.txt)"

          if [ -z "$plugin_version" ] || [ -z "$constant_version" ] || [ -z "$stable_tag" ]; then
            echo "Missing plugin version, WCH_VERSION, or readme Stable tag." >&2
            exit 1
          fi

          if [ "$plugin_version" != "$constant_version" ]; then
            echo "Plugin header Version ($plugin_version) does not match WCH_VERSION ($constant_version)." >&2
            exit 1
          fi

          if [ "$plugin_version" != "$stable_tag" ]; then
            echo "Plugin header Version ($plugin_version) does not match readme Stable tag ($stable_tag)." >&2
            exit 1
          fi

          if [[ "${GITHUB_REF:-}" == refs/tags/v* ]]; then
            tag_version="${GITHUB_REF_NAME#v}"
            if [ "$tag_version" != "$plugin_version" ]; then
              echo "Git tag $GITHUB_REF_NAME does not match plugin version $plugin_version." >&2
              exit 1
            fi
          fi

          echo "version=$plugin_version" >> "$GITHUB_OUTPUT"
          echo "zip_name=wc-herroepingsfunctie-$plugin_version.zip" >> "$GITHUB_OUTPUT"

      - name: Build installable ZIP
        run: |
          set -euo pipefail

          mkdir -p dist
          git archive \
            --format=zip \
            --prefix=wc-herroepingsfunctie/ \
            HEAD \
            -o "dist/${{ steps.version.outputs.zip_name }}"
          unzip -t "dist/${{ steps.version.outputs.zip_name }}"

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.version.outputs.zip_name }}
          path: dist/${{ steps.version.outputs.zip_name }}
          if-no-files-found: error

      - name: Create or update GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
          ZIP_PATH: dist/${{ steps.version.outputs.zip_name }}
        run: |
          set -euo pipefail

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" "$ZIP_PATH" --clobber
          else
            gh release create "$TAG_NAME" "$ZIP_PATH" \
              --title "$TAG_NAME" \
              --generate-notes \
              --verify-tag
          fi
